name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "main"

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing required environment secret: ${secret_name}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Link Supabase project (test)
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations (test)
        run: supabase db push --linked --yes

      - name: Deploy edge functions (test)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t functions_to_deploy < <(
            find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name "_shared" \
              | while read -r dir; do
                  if [[ -f "$dir/index.ts" ]]; then
                    basename "$dir"
                  fi
                done \
              | sort -u
          )

          for fn in "${functions_to_deploy[@]}"; do
            echo "Deploying edge function: ${fn}"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Pull Vercel project settings (preview)
        run: npx vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Build Vercel preview artifact
        run: npx vercel build --token "$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        run: npx vercel deploy --prebuilt --token "$VERCEL_TOKEN"

name: Deploy Supabase

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing required repository secret: ${secret_name}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --linked --yes

      - name: Deploy changed edge functions
        shell: bash
        run: |
          set -euo pipefail

          all_functions() {
            find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name "_shared" \
              | while read -r dir; do
                  if [[ -f "$dir/index.ts" ]]; then
                    basename "$dir"
                  fi
                done \
              | sort -u
          }

          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            mapfile -t functions_to_deploy < <(all_functions)
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
            if echo "$changed_files" | grep -q '^supabase/functions/_shared/'; then
              mapfile -t functions_to_deploy < <(all_functions)
            else
              mapfile -t functions_to_deploy < <(
                echo "$changed_files" \
                  | awk -F/ '/^supabase\/functions\/[^/]+\// && $3 != "_shared" { print $3 }' \
                  | sort -u
              )
            fi
          fi

          if [[ "${#functions_to_deploy[@]}" -eq 0 ]]; then
            echo "No edge function changes detected."
            exit 0
          fi

          for fn in "${functions_to_deploy[@]}"; do
            if [[ -f "supabase/functions/${fn}/index.ts" ]]; then
              echo "Deploying edge function: ${fn}"
              supabase functions deploy "${fn}" --project-ref "$SUPABASE_PROJECT_REF"
            fi
          done

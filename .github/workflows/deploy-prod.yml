name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "main"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_FLAT_MONTHLY_ID: ${{ secrets.STRIPE_PRICE_FLAT_MONTHLY_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PRICE_FLAT_MONTHLY_ID VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing required environment secret: ${secret_name}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Show deploy target (production)
        run: |
          echo "GitHub environment: prod"
          echo "Supabase project ref: $SUPABASE_PROJECT_REF"

      - name: Link Supabase project (production)
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Sync Supabase Edge secrets (production)
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets set \
            --project-ref "$SUPABASE_PROJECT_REF" \
            STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
            STRIPE_PRICE_FLAT_MONTHLY_ID="$STRIPE_PRICE_FLAT_MONTHLY_ID"

      - name: Push database migrations (production)
        run: supabase db push --linked --yes

      - name: Deploy edge functions (production)
        shell: bash
        run: |
          set -euo pipefail

          all_functions() {
            find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name "_shared" \
              | while read -r dir; do
                  if [[ -f "$dir/index.ts" ]]; then
                    basename "$dir"
                  fi
                done \
              | sort -u
          }

          if [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
            if echo "$changed_files" | grep -q '^supabase/functions/_shared/'; then
              mapfile -t functions_to_deploy < <(all_functions)
            else
              mapfile -t functions_to_deploy < <(
                echo "$changed_files" \
                  | awk -F/ '/^supabase\/functions\/[^/]+\// && $3 != "_shared" { print $3 }' \
                  | sort -u
              )
            fi
          else
            mapfile -t functions_to_deploy < <(all_functions)
          fi

          # If the target project has no deployed functions yet, deploy all even if this commit
          # did not touch supabase/functions.
          if [[ "${#functions_to_deploy[@]}" -eq 0 ]]; then
            remote_functions_json="$(supabase functions list --project-ref "$SUPABASE_PROJECT_REF" --output json)"
            remote_count="$(printf '%s' "$remote_functions_json" | node -e 'const fs=require("fs"); const s=fs.readFileSync(0,"utf8").trim(); const arr=s ? JSON.parse(s) : []; process.stdout.write(String(Array.isArray(arr) ? arr.length : 0));')"
            if [[ "$remote_count" -eq 0 ]]; then
              echo "No remote edge functions found in target project. Deploying all functions."
              mapfile -t functions_to_deploy < <(all_functions)
            fi
          fi

          if [[ "${#functions_to_deploy[@]}" -eq 0 ]]; then
            echo "No edge function changes detected."
          else
            for fn in "${functions_to_deploy[@]}"; do
              if [[ -f "supabase/functions/${fn}/index.ts" ]]; then
                echo "Deploying edge function: ${fn}"
                supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
              fi
            done
          fi

      - name: Pull Vercel project settings (production)
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel production artifact
        run: npx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy Vercel production
        run: npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
